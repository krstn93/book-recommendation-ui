<div class="app-shell">
  <header class="site-header">
    <p-menubar [model]="menuItems" styleClass="site-menu">
      <ng-template #start>
        <a class="brand" href="/" aria-label="Book Recommendation home">
          <span class="brand-mark">BR</span>
          <span class="brand-name">Book Recommendations</span>
        </a>
      </ng-template>
    </p-menubar>
  </header>

  <main class="home-page">
    <section class="coming-soon" aria-labelledby="coming-soon-title">
      <p class="eyebrow">Book discovery tools are on the way</p>
      <h1 id="coming-soon-title">Coming Soon</h1>
      <p class="intro">
        A personal space for recommendations, reading lists, and bookshelves is
        being prepared.
      </p>
    </section>
  </main>
</div>
